<svg width="900" height="320" viewBox="0 0 900 320" xmlns="http://www.w3.org/2000/svg">

  <defs>
    <style>
      :root {
        --fut-color: #1a2f6f;     /* Navy Blue */
        --koru-color: #f5e6a8;    /* Yellow Cream */
        --pulse-color: #5aa832;   /* Green */
        --ball-color: #d9d9d9;
      }

      .fut { fill: var(--fut-color); font-weight: 700; }
      .koru { fill: var(--koru-color); font-weight: 700; }
      .pulse {
        stroke: var(--pulse-color);
        stroke-width: 6;
        fill: none;
        stroke-linejoin: round;
        stroke-linecap: round;
      }
      .ball {
        stroke: var(--ball-color);
        fill: none;
        stroke-width: 2;
      }
    </style>
  </defs>

  <!-- Slight italic/skew group -->
  <g transform="skewX(-10)">

    <!-- Text (tighter spacing) -->
    <text x="60" y="140" font-size="100" font-family="Arial, Helvetica, sans-serif">
      <tspan class="fut">Fut</tspan>
      <tspan class="koru" dx="-18">Koru</tspan>
    </text>

    <!-- Pulse line (reshaped to match reference flow) -->
    <path class="pulse"
      d="
        M60 210
        L210 210
        L240 195
        L260 225
        L285 170
        L310 235
        L340 205
        L760 205
      "
    />

    <!-- Soccer ball -->
    <circle cx="790" cy="205" r="32" class="ball"/>

    <!-- Ball inner pattern (cleaner, subtle) -->
    <polygon points="790,185 805,195 800,215 780,215 775,195" class="ball"/>
    <line x1="790" y1="185" x2="790" y2="165" class="ball"/>
    <line x1="805" y1="195" x2="825" y2="185" class="ball"/>
    <line x1="775" y1="195" x2="755" y2="185" class="ball"/>

  </g>
</svg>