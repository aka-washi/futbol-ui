<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 120">
  <defs>
    <linearGradient id="futGradient" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="var(--fut-top, #6EC6FF)" />
      <stop offset="100%" stop-color="var(--fut-bottom, #2F80ED)" />
    </linearGradient>
  </defs>

  <style>
    :root {
      --koru-color: #FFFFFF;
      --pulse-color: #00FF6A;
      --ball-fill: #FFFFFF;
      --ball-stroke: #111111;
    }
  </style>

  <!-- Fut (gradient) -->
  <text x="20" y="55"
        font-family="system-ui, sans-serif"
        font-size="40"
        font-weight="700"
        fill="url(#futGradient)">
    Fut
  </text>

  <!-- Koru -->
  <text x="125" y="55"
        font-family="system-ui, sans-serif"
        font-size="40"
        font-weight="600"
        fill="var(--koru-color)">
    Koru
  </text>

  <!-- Pulse -->
  <path d="M20 80 L70 80 L85 60 L100 95 L115 75 L150 75 L190 75 L210 60 L225 90 L245 75 L290 75"
        fill="none"
        stroke="var(--pulse-color)"
        stroke-width="4"
        stroke-linecap="round"
        stroke-linejoin="round" />

  <!-- Detailed vector ball -->
  <circle cx="310" cy="75" r="12"
          fill="var(--ball-fill)"
          stroke="var(--ball-stroke)"
          stroke-width="2" />

  <path d="M310 63 L303 70 L305 80 L315 80 L317 70 Z"
        fill="var(--ball-stroke)" />
</svg>
