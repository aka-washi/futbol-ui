<svg width="800" height="300" viewBox="0 0 800 300" xmlns="http://www.w3.org/2000/svg">

  <style>
    :root {
      --fut-color: #1a2f6f;     /* Navy Blue */
      --koru-color: #f5e6a8;    /* Yellow Cream */
      --line-color: #5aa832;    /* Green heartbeat */
      --ball-stroke: #cccccc;
    }

    .fut { fill: var(--fut-color); font-weight: 700; }
    .koru { fill: var(--koru-color); font-weight: 700; }
    .heartbeat { stroke: var(--line-color); stroke-width: 6; fill: none; }
    .ball { stroke: var(--ball-stroke); fill: none; stroke-width: 2; }
  </style>

  <!-- Text -->
  <text x="50" y="140" font-size="90" font-family="Arial, Helvetica, sans-serif">
    <tspan class="fut">Fut</tspan>
    <tspan class="koru">Koru</tspan>
  </text>

  <!-- Heartbeat Line -->
  <path class="heartbeat"
        d="M50 200 
           L200 200 
           L230 170 
           L260 230 
           L290 160 
           L320 220 
           L350 200 
           L700 200" />

  <!-- Soccer Ball -->
  <circle cx="730" cy="200" r="30" class="ball" />
  
  <!-- Simple inner pattern (minimal hex look) -->
  <polygon points="730,180 745,190 740,210 720,210 715,190" class="ball"/>
  <line x1="730" y1="180" x2="730" y2="160" class="ball"/>
  <line x1="745" y1="190" x2="765" y2="180" class="ball"/>
  <line x1="715" y1="190" x2="695" y2="180" class="ball"/>
</svg>